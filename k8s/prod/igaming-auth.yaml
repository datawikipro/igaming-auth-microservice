apiVersion: apps/v1
kind: Deployment
metadata:
  name: igaming-auth
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: igaming-auth
  template:
    metadata:
      labels:
        app: igaming-auth
    spec:
      containers:
        - name: igaming-auth
          image: ghcr.io/datawikipro/igaming-auth-microservice:latest
          ports:
            - containerPort: 8000
          env:
            - name: MDM_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: igaming-auth-secrets
                  key: MDM_DB_HOST
            - name: MDM_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: igaming-auth-secrets
                  key: MDM_DB_PORT
            - name: MDM_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: igaming-auth-secrets
                  key: MDM_DB_NAME
            - name: MDM_DB_USER
              valueFrom:
                secretKeyRef:
                  name: igaming-auth-secrets
                  key: MDM_DB_USER
            - name: MDM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: igaming-auth-secrets
                  key: MDM_DB_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: igaming-auth-secrets
                  key: JWT_SECRET_KEY
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: igaming-auth-secrets
                  key: CORS_ORIGINS
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: igaming-auth-secrets
                  key: INTERNAL_API_KEY
            - name: BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: igaming-auth-secrets
                  key: BOT_TOKEN
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: igaming-auth
  namespace: default
spec:
  selector:
    app: igaming-auth
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
