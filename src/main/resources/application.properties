server.port=${AUTH_SERVER_PORT:8000}
server.address=${AUTH_SERVER_HOST:0.0.0.0}

# Database
spring.datasource.url=jdbc:postgresql://${MDM_DB_HOST:localhost}:${MDM_DB_PORT:5432}/${MDM_DB_NAME:igaming_auth}
spring.datasource.username=${MDM_DB_USER:igaming_user}
spring.datasource.password=${MDM_DB_PASSWORD:igaming_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret-key=${JWT_SECRET_KEY:igaming-jwt-secret-key}
jwt.expire-minutes=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:1440}

# CORS
cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Internal API key
internal.api-key=${INTERNAL_API_KEY:igaming-internal-secret}

# Telegram bot token
telegram.bot-token=${BOT_TOKEN:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.pro.datawiki=INFO
logging.level.org.springframework.security=WARN
